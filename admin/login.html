<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - JalDrishti Connect</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="../styles.css">
    
    <!-- Supabase JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
</head>
<body class="login-body">
    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"></div>

    <div class="login-wrapper">
        <a href="../landing.html" class="login-back-link">
            <i data-lucide="arrow-left"></i> Back to Home
        </a>
        
        <div class="login-card glass-card">
            <div class="login-header">
                <div class="login-icon-wrapper blue-glow">
                    <i data-lucide="shield-check"></i>
                </div>
                <h2>Admin Portal</h2>
                <p>Secure access for authorized administrators only.</p>
            </div>
            
            <form id="admin-login-form" class="login-form">
                <div class="input-group">
                    <label for="admin-email">Admin ID / Email</label>
                    <div class="input-with-icon">
                        <i data-lucide="mail"></i>
                        <input type="email" id="admin-email" placeholder="harishankarofficial08@gmail.com" required autocomplete="username">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="admin-password">Password</label>
                    <div class="input-with-icon">
                        <i data-lucide="lock"></i>
                        <input type="password" id="admin-password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" id="toggle-password" class="pwd-toggle" aria-label="Show password">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-pwd" onclick="event.preventDefault(); showToast('Reset Password', 'Please contact the system administrator to reset your password.', 'info')">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary login-btn" id="login-submit-btn">
                    <span>Secure Login</span>
                    <i data-lucide="arrow-right"></i>
                </button>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="#" id="toggle-register" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">Don't have an admin account? <span style="color: var(--primary);">Register</span></a>
                </div>
            </form>
            
            <div class="login-footer">
                <p>Protected by JalDrishti Connect Security</p>
            </div>
        </div>
    </div>

    <!-- App JavaScript -->
    <script src="login.js"></script>
</body>
</html>
